name: Refresh Python Lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.head_ref == 'chore/upgrade-python-3.14'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          python-version: "3.14"
      - name: Regenerate lockfile for Python 3.14
        run: uv lock --python 3.14
      - name: Commit regenerated lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "Regenerate lockfile for Python 3.14"
          git push origin HEAD:${GITHUB_HEAD_REF}
