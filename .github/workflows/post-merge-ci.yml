name: Post-Merge CI

# Runs all CI jobs after merging to main to catch any issues that slipped through

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.set-outputs.outputs.image-tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: lowercase
        run: echo "image-name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image tag output
        id: set-outputs
        run: echo "image-tag=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image-name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: lowercase
        run: echo "image-name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-typecheck:
    name: Frontend Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend lint
        run: cd frontend && npm run lint

      - name: Run frontend typecheck
        run: cd frontend && npm run typecheck

  test-unit:
    name: Backend Tests
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image-tag }}
    needs: build
    timeout-minutes: 20
    env:
      CI: true
      SECRET_KEY: test-secret-key-for-testing-only
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/comic_pile_test
      PGUSER: postgres
      PATH: "/workspace/.venv/bin:/usr/local/bin:/usr/bin:/bin"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comic_pile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove .env file to prevent CI database override
        run: rm -f .env .env.test .env.backup .envrc .env.local .env.production 2>/dev/null || true

      - name: Wait for PostgreSQL
        run: |
          i=1
          while [ $i -le 30 ]; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
            i=$((i + 1))
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Run backend tests
        run: pytest tests/ -n 4 --cov=comic_pile --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          name: codecov-umbrella

  test-e2e-api:
    name: E2E API Tests
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image-tag }}
    needs: build
    timeout-minutes: 20
    env:
      CI: true
      SECRET_KEY: test-secret-key-for-testing-only
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/comic_pile_test
      PATH: "/workspace/.venv/bin:/usr/local/bin:/usr/bin:/bin"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comic_pile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove .env file to prevent CI database override
        run: rm -f .env .env.test .env.backup .envrc .env.local .env.production 2>/dev/null || true

      - name: Wait for PostgreSQL
        run: |
          i=1
          while [ $i -le 30 ]; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
            i=$((i + 1))
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Run E2E API tests
        run: pytest tests_e2e/test_api_workflows.py -n 4 -v --no-cov

  test-e2e-dice-ladder:
    name: E2E Dice Ladder
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image-tag }}
    needs: build
    timeout-minutes: 20
    env:
      CI: true
      SECRET_KEY: test-secret-key-for-testing-only
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/comic_pile_test
      PATH: "/workspace/.venv/bin:/usr/local/bin:/usr/bin:/bin"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comic_pile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove .env file to prevent CI database override
        run: rm -f .env .env.test .env.backup .envrc .env.local .env.production 2>/dev/null || true

      - name: Wait for PostgreSQL
        run: |
          i=1
          while [ $i -le 30 ]; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
            i=$((i + 1))
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Run E2E dice ladder tests
        run: pytest tests_e2e/test_dice_ladder_e2e.py -n 4 --no-cov -v

  test-e2e-playwright:
    name: E2E Playwright Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.totalShards }})
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image-tag }}
      options: >-
        --shm-size=2gb
        --memory=8gb
        --cpus=4
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6]
        totalShards: [6]
    env:
      CI: true
      TEST_ENVIRONMENT: "true"
      SECRET_KEY: test-secret-key-for-testing-only
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/comic_pile_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/comic_pile_test
      PGUSER: postgres
      PATH: "/workspace/.venv/bin:/usr/local/bin:/usr/bin:/bin"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comic_pile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove .env file to prevent CI database override
        run: rm -f .env .env.test .env.backup .envrc .env.local .env.production 2>/dev/null || true

      - name: Wait for PostgreSQL
        run: |
          i=1
          while [ $i -le 30 ]; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
            i=$((i + 1))
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Restore frontend toolchain from CI image
        run: |
          mkdir -p static
          rm -rf frontend/node_modules static/react
          ln -s /opt/ci-assets/frontend/node_modules frontend/node_modules
          ln -s /opt/ci-assets/static/react static/react

      - name: Start backend server
        shell: bash
        run: |
          export AUTO_BACKUP_ENABLED=false
          # Each shard runs Playwright with a single worker, so one backend worker
          # is enough and avoids extra process startup and CPU contention.
          python -m uvicorn app.main:app --host 0.0.0.0 --port 9000 --workers 1 --log-level warning > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend to be ready
        run: |
          i=1
          while [ $i -le 30 ]; do
            if curl -f http://localhost:9000/health 2>/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
            i=$((i + 1))
          done
          echo "Backend failed to start. Log output:"
          cat /tmp/backend.log || true
          exit 1

      - name: Run Playwright tests
        run: cd frontend && REUSE_EXISTING_SERVER=true BASE_URL=http://localhost:9000 npx playwright test --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.totalShards }}

  check-all-jobs:
    name: Post-Merge CI Summary
    runs-on: ubuntu-latest
    needs: [build, frontend-typecheck, test-unit, test-e2e-api, test-e2e-dice-ladder, test-e2e-playwright]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Build: ${{ needs.build.result }}"
          echo "Frontend Lint + Typecheck: ${{ needs.frontend-typecheck.result }}"
          echo "Backend Tests: ${{ needs.test-unit.result }}"
          echo "E2E API Tests: ${{ needs.test-e2e-api.result }}"
          echo "E2E Dice Ladder: ${{ needs.test-e2e-dice-ladder.result }}"
          echo "E2E Playwright Tests: ${{ needs.test-e2e-playwright.result }}"

          if [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.frontend-typecheck.result }}" != "success" ] || \
             [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.test-e2e-api.result }}" != "success" ] || \
             [ "${{ needs.test-e2e-dice-ladder.result }}" != "success" ] || \
             [ "${{ needs.test-e2e-playwright.result }}" != "success" ]; then
            echo "::error::One or more post-merge CI jobs failed. Please review the failures."
            exit 1
          fi

          echo "::notice::All post-merge CI jobs passed successfully!"
